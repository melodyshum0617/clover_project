<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>幸運草智慧典藏PRO | 我的收藏博物館</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --primary-dark: #059669; --bg-color: #f8fafc; --surface: #ffffff; --text-main: #0f172a; --text-muted: #64748b; --border-color: #e2e8f0; --danger: #ef4444; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; }
        .navbar { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); padding: 15px 40px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center;}
        .navbar h1 { margin: 0; font-size: 20px; font-weight: 900; color: var(--primary-dark); flex-shrink: 0; }
        .navbar .badge { background: #d1fae5; color: #065f46; font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 700;}
        
        .layout-grid { display: grid; grid-template-columns: 300px 1fr; gap: 30px; max-width: 1400px; margin: 30px auto; padding: 0 40px; align-items: start;}
        .panel { background: var(--surface); border-radius: 16px; padding: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.03); border: 1px solid var(--border-color); margin-bottom: 25px;}
        .panel-title { font-size: 15px; font-weight: 700; margin: 0 0 15px 0; color: var(--text-main); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; }
        input, select { width: 100%; padding: 10px 12px; background: #f8fafc; border: 1px solid var(--border-color); border-radius: 8px; font-size: 13px; font-family: inherit; color: var(--text-main); box-sizing: border-box; }
        input:focus, select:focus { outline: none; background: white; border-color: var(--primary); }
        
        input[type="file"] { padding: 8px 10px; background: white; border: 1px dashed var(--border-color); font-size: 12px;}
        input[type="file"]::file-selector-button { background: #f1f5f9; color: #1e293b; border: 1px solid #e2e8f0; padding: 4px 8px; border-radius: 6px; font-size: 12px; cursor: pointer;}
        input[type="file"]::file-selector-button:hover { background: #e2e8f0;}

        button.btn-primary { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);}
        button.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px);}

        .kpi-card { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 12px 15px; border-radius: 10px; margin-bottom: 12px; }
        .kpi-city { font-size: 13px; font-weight: 700; color: #166534; margin-bottom: 4px; }
        .kpi-value { font-size: 20px; font-weight: 900; color: #14532d; display: flex; align-items: baseline; gap: 4px;}
        .kpi-value small { font-size: 12px; font-weight: 500; color: #166534; }
        
        .toolbar { display: flex; gap: 15px; margin-bottom: 25px; }
        .search-box { flex-grow: 1; position: relative; }
        .search-box input { padding-left: 35px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .search-icon { position: absolute; left: 12px; top: 10px; color: var(--text-muted); }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .card { background: var(--surface); border-radius: 14px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.02); animation: fadeIn 0.4s ease forwards; transition: all 0.3s;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px -8px rgba(0,0,0,0.08); }
        .card-img { width: 100%; height: 160px; object-fit: cover; background: #e2e8f0; position: relative; }
        .status-pill { position: absolute; top: 10px; right: 10px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; color: white; background-color: rgba(16, 185, 129, 0.9); backdrop-filter: blur(4px);}
        .card-body { padding: 18px; }
        .card-title { font-size: 16px; font-weight: 900; margin: 0 0 10px 0; color: var(--text-main); }
        .card-info { font-size: 12px; color: var(--text-muted); line-height: 1.7; margin-bottom: 12px; }
        .btn-delete { background: #fff1f2; color: var(--danger); border: 1px solid #ffe4e6; width: 100%; padding: 8px; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; border-style: solid; }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* 幸運抽卡彈出視窗樣式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            border: 2px solid #10b981;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #f1f5f9;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
        }
        .modal-close:hover {
            background: #e2e8f0;
            color: #0f172a;
        }
        .lucky-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin: 15px 0;
            border: 1px solid #e2e8f0;
        }
        .lucky-title {
            font-size: 18px;
            font-weight: 900;
            color: #047857;
            margin: 8px 0;
        }
        .lucky-quote {
            font-size: 13px;
            color: #15803d;
            background: #ecfdf5;
            padding: 12px;
            border-radius: 10px;
            border-left: 4px solid #10b981;
            margin-top: 15px;
            font-style: italic;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1>🍀CLOVER MUSEUM🍀 <span class="badge">PRO 收藏版 by沈思妤</span></h1>
        <div style="font-size: 12px; color: var(--text-muted); max-width: 520px; text-align: right; line-height: 1.6; font-weight: 500;">
            本館致力於數位化典藏幸運草實體標本與珍貴週邊。系統導入關聯式資料庫架構，<br>
            並支援高效條件篩選與即時照片傳輸，旨在打造最完整的幸運草智慧典藏圖鑑。
        </div>
    </nav>
    
    <div class="layout-grid">
        <aside>
            <div class="panel">
                <h2 class="panel-title">📥 收藏品登記</h2>
                <form id="cloverForm">
                    <div class="form-group">
                        <label>藏品名稱</label>
                        <input type="text" id="itemName" placeholder="例如：野生四葉草標本" required>
                    </div>
                    <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <label>類別</label>
                            <select id="category">
                                <option value="實體植物">實體植物</option>
                                <option value="週邊小物">週邊小物</option>
                                <option value="手工製作">手工製作</option>
                            </select>
                        </div>
                        <div>
                            <label>葉數 (選填)</label>
                            <input type="number" id="leafCount" placeholder="3~5" min="3" max="5">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>藏品照片上傳 (🌟請選擇照片)</label>
                        <input type="file" id="imageFile" name="imageFile" accept="image/*">
                    </div>

                    <div class="form-group">
                        <label>地理位置與地點（採集或購買）</label>
                        <div style="display: flex; gap: 10px;">
                            <select id="city" style="width: 90px;">
                                <option value="國內">國內</option>
                                <option value="國外">國外</option>
                            </select>
                            <input type="text" id="placeName" placeholder="具體國家與地點..." required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>保存與狀態</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="storageMethod" placeholder="如：真空封裝" required>
                            <select id="condition" style="width: 100px;">
                                <option value="完美">完美</option>
                                <option value="良好">良好</option>
                                <option value="褪色">褪色</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>採集或獲取方式</label>
                        <select id="method">
                            <option value="自然採集">自然採集 (野生發現)</option>
                            <option value="線上購買">線上購買 (網購/蝦皮)</option>
                            <option value="實體店購入">實體店購入 (專賣店/專櫃)</option>
                            <option value="他人贈送">他人贈送 (演唱會/親友)</option>
                            <option value="旅途尋獲">旅途尋獲 (出國旅遊求得)</option>
                            <option value="其他管道">其他管道 (委託代購等)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">上傳檔案並寫入博物館</button>
                </form>
            </div>

            <div class="panel">
                <h2 class="panel-title">📊 大數據聚合 (GROUP BY)</h2>
                <div class="kpi-grid" id="statsContainer">
                    <div style="color: #94a3b8; font-size: 13px;">伺服器即時運算中...</div>
                </div>
            </div>

            <!-- 🌟 亮點功能：今日幸運抽卡 -->
            <div class="panel" style="background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%); border: 1px solid #a7f3d0; text-align: center;">
                <h2 class="panel-title" style="color: #065f46; font-size: 15px; margin-bottom: 8px; font-weight: 900;">🌟 今日幸運抽卡</h2>
                <p style="font-size: 12px; color: #047857; margin: 0 0 15px 0; line-height: 1.5; font-weight: 500;">從你的數位展間中隨機抽取一片幸運草，獲得今日專屬幸福祝福！</p>
                <button type="button" class="btn-primary" onclick="drawLuckyClover()" style="background: #059669; box-shadow: 0 4px 10px rgba(5, 150, 105, 0.2); width: 100%;">☘️ 抽取我的今日幸運</button>
            </div>
        </aside>

        <main>
            <div class="toolbar">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="搜尋名稱、類別、特徵、地點、保存或狀態...">
                </div>
                <select id="categoryFilter" style="width: 180px; background: white;">
                    <option value="all">📂 全部類別</option>
                    <option value="實體植物">🌱 實體植物</option>
                    <option value="週邊小物">🎁 週邊小物</option>
                    <option value="手工製作">🪡 手工製作</option>
                </select>
            </div>

            <div class="gallery" id="galleryGrid"></div>
        </main>
    </div>

    <script>
        const API_URL = 'http://localhost:4000/api/clovers';
        const statusColors = { '完美': 'background: rgba(16, 185, 129, 0.95);', '良好': 'background: rgba(59, 130, 246, 0.95);', '褪色': 'background: rgba(245, 158, 11, 0.95);' };

        // 載入畫廊
        async function loadClovers() {
            const search = document.getElementById('searchInput').value;
            const category = document.getElementById('categoryFilter').value;
            try {
                const response = await fetch(`${API_URL}?search=${search}&category=${category}`);
                const data = await response.json();
                const gallery = document.getElementById('galleryGrid');
                gallery.innerHTML = ''; 
                
                data.forEach((item, index) => {
                    const imgSrc = item.image_url; 
                    const badgeStyle = statusColors[item.currently_status || item.currently_status] || statusColors[item.目前狀態] || 'background: #64748b;';
                    const delay = index * 0.03;

                    // 🌟 呈現全套精美欄位
                    const cardHtml = `
                        <div class="card" style="animation-delay: ${delay}s">
                            <div style="position: relative;">
                                <img src="${imgSrc}" class="card-img" alt="收藏照片">
                                <span class="status-pill" style="${badgeStyle}">${item.currently_status || item.目前狀態}</span>
                            </div>
                            <div class="card-body">
                                <h3 class="card-title">${item.藏品名稱}</h3>
                                <div class="card-info" style="font-size: 13px; line-height: 1.8; color: #475569;">
                                    🏷️ <b>類別：</b>${item.category || item.類別 || '週邊小物'}<br>
                                    ☘️ <b>特徵：</b>${item.葉數 ? `${item.葉數} 葉草` : '週邊商品'}<br>
                                    📍 <b>地點：</b>${item.城市} · ${item.採集地點}<br>
                                    💡 <b>管道：</b>${item.獲取方式 || '自然採集'}<br>
                                    📦 <b>保存：</b>${item.保存方式}
                                </div>
                                <button class="btn-delete" onclick="deleteClover(${item.item_id})">🗑️ 聯級刪除 (CASCADE)</button>
                            </div>
                        </div>
                    `;
                    gallery.insertAdjacentHTML('beforeend', cardHtml);
                });
            } catch (err) { console.error(err); }
        }

        async function loadStats() {
            try {
                const response = await fetch('http://localhost:4000/api/stats');
                const stats = await response.json();
                const container = document.getElementById('statsContainer');
                container.innerHTML = '';
                stats.forEach(stat => {
                    container.innerHTML += `<div class="kpi-card"><div class="kpi-city">🌍 產地：${stat.城市}</div><div class="kpi-value">${stat.總數量} <small>筆</small></div><div class="kpi-sub" style="font-size: 12px; margin-top: 4px; color: #166534;">☘️ 標本平均葉數：<b>${stat.平均葉數 || 'N/A'}</b> 葉</div></div>`;
                });
            } catch (err) { console.error(err); }
        }

        async function deleteClover(id) {
            if (confirm("🚨 此動作將觸發資料庫外鍵聯級刪除。\n確定要連帶清除子表的關聯資料嗎？")) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if (response.ok) { loadClovers(); loadStats(); }
                } catch (err) { console.error(err); }
            }
        }

        document.getElementById('searchInput').addEventListener('input', loadClovers);
        document.getElementById('categoryFilter').addEventListener('change', loadClovers);

        document.getElementById('cloverForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = "檔案傳輸與資料寫入中...";
            btn.style.opacity = '0.7';

            const formData = new FormData();
            formData.append('itemName', document.getElementById('itemName').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('leafCount', document.getElementById('leafCount').value);
            formData.append('city', document.getElementById('city').value);
            formData.append('placeName', document.getElementById('placeName').value);
            formData.append('method', document.getElementById('method').value);
            formData.append('storageMethod', document.getElementById('storageMethod').value);
            formData.append('condition', document.getElementById('condition').value);
            
            const imageFileInput = document.getElementById('imageFile');
            if (imageFileInput.files.length > 0) {
                formData.append('imageFile', imageFileInput.files[0]);
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert('🎉 你的真實收藏已成功上傳並寫入資料庫！伺服器照片牆與 SQL 儀表板已同步。');
                    document.getElementById('cloverForm').reset();
                    loadClovers();
                    loadStats();
                } else {
                    alert('後端上傳失敗，請檢查資料庫條件。');
                }
            } catch (err) {
                console.error(err);
                alert('連線錯誤。');
            } finally {
                btn.innerText = originalText;
                btn.style.opacity = '1';
            }
        });

        loadClovers();
        loadStats();

        // 🌟【今日幸運占卜籤】極美幸運卡牌數據庫 (非資料庫資料，而是專屬設計的每日御神籤)
        const LUCKY_FORTUNE_CARDS = [
            {
                name: "🌟 大吉 · 璀璨四葉草",
                image: "https://images.unsplash.com/photo-1528183429752-a97d0bf99b5a?w=600&q=80",
                detail: `
                    ☘️ <b>今日守護：</b>璀璨四葉草<br>
                    📈 <b>幸運指數：</b>★★★★★ (滿分！)<br>
                    🔑 <b>今日關鍵字：</b>驚喜、突破、心想事成
                `,
                quote: "「深藏在綠意中的第四片葉子已被你尋獲！今天幸運女神將全程眷顧，無論是課業、生活還是人際關係，都將迎來意想不到的順遂與驚喜。勇敢邁出腳步吧！」"
            },
            {
                name: "💫 奇蹟 · 罕見五葉草",
                image: "https://images.unsplash.com/photo-1533240332313-0db49b439ad3?w=600&q=80",
                detail: `
                    ☘️ <b>今日守護：</b>黃金五葉草<br>
                    📈 <b>幸運指數：</b>★★★★★★ (破表！)<br>
                    🔑 <b>今日關鍵字：</b>財運大發、奇蹟、大吉大利
                `,
                quote: "「突破百萬分之一機率的奇蹟之葉為你綻放！代表健康、財富與名譽的頂級好運正在路上。今天非常適合進行重要決策或大膽嘗試，好運與正能量即將爆棚！」"
            },
            {
                name: "☀️ 中吉 · 溫馨三葉草",
                image: "https://images.unsplash.com/photo-1533240332313-0db49b439ad3?w=600&q=80",
                detail: `
                    ☘️ <b>今日守護：</b>朝陽三葉草<br>
                    📈 <b>幸運指數：</b>★★★★☆ (極佳！)<br>
                    🔑 <b>今日關鍵字：</b>希望、療癒、平靜小確幸
                `,
                quote: "「代表信仰、希望與愛的三葉草，正散發著溫柔的光芒。今天的生活將充滿令人會心一笑的小確幸，老友的問候或家人的擁抱，會為你注入滿滿的療癒能量。」"
            },
            {
                name: "🌿 小吉 · 初萌雙葉草",
                image: "https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?w=600&q=80",
                detail: `
                    ☘️ <b>今日守護：</b>初萌雙葉新芽<br>
                    📈 <b>幸運指數：</b>★★★☆☆ (平順！)<br>
                    🔑 <b>今日關鍵字：</b>成長、起點、蓄勢待發
                `,
                quote: "「每一片偉大的四葉草，都始於最初的萌芽。今天代表著『新生與起點』，非常適合靜下心來為未來做規劃，你的努力正如這株新芽，正在泥土下悄悄茁壯成長！」"
            },
            {
                name: "🌸 吉 · 守護粉嫩草",
                image: "https://images.unsplash.com/photo-1526047932273-341f2a7631f9?w=600&q=80",
                detail: `
                    ☘️ <b>今日守護：</b>粉嫩花瓣草<br>
                    📈 <b>幸運指數：</b>★★★★☆ (人緣爆棚！)<br>
                    🔑 <b>今日關鍵字：</b>好人緣、溫柔守護、桃花朵朵
                `,
                quote: "「綻放的粉嫩幸運花瓣，代表著溫柔的守護。今天你在人際交往中會格外受歡迎，親和力滿分！多給身邊的人一個微笑，這份幸福與幸運會加倍回到你身上喔！」"
            }
        ];

        // 隨機抽取今日幸運 (幸運占卜籤)
        function drawLuckyClover() {
            const randomIndex = Math.floor(Math.random() * LUCKY_FORTUNE_CARDS.length);
            const card = LUCKY_FORTUNE_CARDS[randomIndex];
            
            // 設定彈出視窗資料
            document.getElementById('luckyImg').src = card.image;
            document.getElementById('luckyName').innerText = card.name;
            document.getElementById('luckyDetail').innerHTML = card.detail;
            document.getElementById('luckyQuote').innerText = card.quote;
            
            // 顯示彈出視窗
            document.getElementById('luckyModal').classList.add('active');
        }

        function closeLuckyModal() {
            document.getElementById('luckyModal').classList.remove('active');
        }
    </script>

    <!-- 幸運抽卡 Modal 彈出視窗 -->
    <div class="modal-overlay" id="luckyModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeLuckyModal()">✕</button>
            <h2 style="font-size: 20px; font-weight: 900; margin: 0 0 10px 0; color: #059669; display: flex; align-items: center; justify-content: center; gap: 8px;">
                🍀 今日幸運契機 🍀
            </h2>
            <img src="" id="luckyImg" class="lucky-img" alt="幸運草照片">
            <h3 id="luckyName" class="lucky-title"></h3>
            <div id="luckyDetail" style="font-size: 13px; color: #475569; line-height: 1.7; text-align: left; background: #f8fafc; padding: 12px 18px; border-radius: 10px; width: 85%; margin: 10px auto; border: 1px solid #e2e8f0;"></div>
            <div id="luckyQuote" class="lucky-quote"></div>
        </div>
    </div>
</body>
</html>
